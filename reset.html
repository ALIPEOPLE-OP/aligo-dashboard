<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>데이터 초기화</title>
<style>
  body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f1f5f9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
  .box{background:white;border-radius:16px;padding:40px 44px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12);}
  h2{font-size:20px;font-weight:800;color:#1e293b;margin-bottom:8px;}
  p{font-size:13px;color:#64748b;line-height:1.7;margin-bottom:24px;}
  .btn-reset{width:100%;padding:14px;background:#dc2626;color:white;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:12px;}
  .btn-reset:hover{background:#b91c1c;}
  .btn-back{display:block;color:#2563eb;font-size:13px;font-weight:600;text-decoration:none;margin-top:8px;}
  .result{margin-top:20px;padding:14px;border-radius:10px;font-size:13px;font-weight:700;display:none;}
  .result.ok{background:#f0fdf4;color:#166534;border:1px solid #86efac;}
  .result.err{background:#fff1f2;color:#9f1239;border:1px solid #fca5a5;}
  ul{text-align:left;font-size:12px;color:#475569;margin:12px 0 0;padding-left:20px;line-height:2;}
</style>
</head>
<body>
<div class="box">
  <div style="font-size:40px;margin-bottom:12px">🗑️</div>
  <h2>데이터 전체 초기화</h2>
  <p>저장된 URL · 시트 이름 · 히스토리를 모두 삭제합니다.<br>로그인 정보는 유지됩니다.</p>
  <ul>
    <li>CS 데이터 소스 URL</li>
    <li>발신번호 인증 데이터 소스 URL</li>
    <li>사업자 인증 데이터 소스 URL</li>
    <li>데이터 등록 히스토리 전체</li>
  </ul>
  <br>
  <button class="btn-reset" onclick="doReset()">🗑️ 지금 초기화하기</button>
  <a class="btn-back" href="index.html">← 대시보드로 돌아가기</a>
  <div class="result" id="result"></div>
</div>
<script>
function doReset(){
  try {
    var keys = [
      'op_url_cs','op_sheet_cs','op_admin_cs',
      'op_url_caller','op_sheet_caller','op_admin_caller',
      'op_url_biz','op_sheet_biz','op_admin_biz',
      'op_history'
    ];
    keys.forEach(function(k){ localStorage.removeItem(k); });

    var r = document.getElementById('result');
    r.className = 'result ok';
    r.innerHTML = '✅ 초기화 완료!<br><br>아래 버튼을 눌러 대시보드로 이동한 뒤<br><strong>지표 관리 탭</strong>에서 새 URL을 입력해 주세요.';
    r.style.display = 'block';

    // 버튼을 대시보드 이동으로 교체
    document.querySelector('.btn-reset').textContent = '→ 대시보드로 이동';
    document.querySelector('.btn-reset').style.background = '#2563eb';
    document.querySelector('.btn-reset').onclick = function(){ location.href='index.html'; };
  } catch(e) {
    var r = document.getElementById('result');
    r.className = 'result err';
    r.innerHTML = '❌ 오류: ' + e.message;
    r.style.display = 'block';
  }
}
</script>
</body>
</html>
