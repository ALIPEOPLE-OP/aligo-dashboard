name: 데이터 자동 갱신

on:
  schedule:
    - cron: '0 * * * *'   # 매시간 정각 자동 실행
  workflow_dispatch:        # GitHub 웹에서 수동 실행도 가능

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: GAS에서 데이터 받아 data.js 갱신
        run: node update-data.js

      - name: 변경 사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet && echo "변경 없음 — 커밋 생략" || (
            git commit -m "🔄 데이터 자동 갱신 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
            git push
          )
