<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GAS 데이터 수신 검증</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background:#f1f5f9; padding:30px; margin:0; }
  h2 { color:#1e40af; margin-bottom:20px; }
  .card { background:white; border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.1); }
  .row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f1f5f9; }
  .row:last-child { border-bottom:none; }
  .label { font-weight:700; color:#334155; }
  .count { font-size:22px; font-weight:800; color:#2563eb; }
  .range { font-size:12px; color:#64748b; }
  .ok { color:#16a34a; }
  .err { color:#dc2626; font-size:12px; }
  button { background:#2563eb; color:white; border:none; border-radius:8px; padding:10px 24px; font-size:14px; font-weight:700; cursor:pointer; }
  button:disabled { opacity:.5; }
  #status { font-size:13px; color:#64748b; margin-top:8px; }
  code { background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:11px; }
</style>
</head>
<body>
<h2>🔬 GAS 데이터 수신 검증</h2>
<div class="card">
  <p style="font-size:13px;color:#64748b;margin:0 0 12px">
    아래 버튼을 누르면 GAS에서 직접 데이터를 가져와 실제 수신 행 수를 확인합니다.<br>
    <strong>방식: JSONP</strong> — 기존 GAS 코드에서도 바로 동작합니다.
  </p>
  <button id="runBtn" onclick="runTest()">▶ 검증 시작</button>
  <div id="status"></div>
</div>
<div id="results"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbxtDPuLp_dwIZRN1f4C7nvo9EcQvh8FGfD-b7iemooEX-5fbvBUyuGwNDFTJldVJGHklA/exec';
const TABS = [
  { name:'CS상담' },
  { name:'인증-발신번호' },
  { name:'인증-사업자' },
  { name:'채팅상담' },
];

// JSONP 방식 — file:// 완전 호환, 기존 GAS 코드 OK
function fetchViaJSONP(sheetName, timeoutMs) {
  return new Promise((resolve) => {
    const cbName = '_gasCB_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const url = GAS + '?sheet=' + encodeURIComponent(sheetName) + '&callback=' + cbName;

    const script = document.createElement('script');
    let done = false;
    const finish = (data) => {
      if (done) return; done = true;
      clearTimeout(timer);
      try { delete window[cbName]; } catch(e) {}
      try { if (script.parentNode) script.parentNode.removeChild(script); } catch(e) {}
      resolve(data);
    };

    window[cbName] = (data) => finish(Array.isArray(data) ? data : { _error: JSON.stringify(data).slice(0,100) });
    const timer = setTimeout(() => finish({ _timeout: true }), timeoutMs || 40000);
    script.onerror = () => finish({ _networkError: true });
    script.src = url;
    document.head.appendChild(script);
  });
}

function getDateRange(rows) {
  const dates = rows
    .map(r => Object.values(r).find(v => /^\d{4}-\d{2}-\d{2}/.test(String(v))) || '')
    .filter(Boolean).map(d => String(d).slice(0,10)).sort();
  if (!dates.length) return '날짜 컬럼 없음';
  return `${dates[0]} ~ ${dates[dates.length-1]}`;
}

async function runTest() {
  const btn = document.getElementById('runBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  btn.disabled = true;
  results.innerHTML = '';
  status.textContent = '검증 중... (최대 40초 소요)';

  let html = '<div class="card"><div style="font-weight:800;color:#334155;margin-bottom:12px">📊 시트별 수신 결과 (JSONP)</div>';
  let totalRaw = 0, allOk = true;

  for (const tab of TABS) {
    status.textContent = `[${tab.name}] 불러오는 중...`;
    const data = await fetchViaJSONP(tab.name, 40000);

    if (!Array.isArray(data)) {
      allOk = false;
      let errMsg = '❌ 알 수 없는 오류';
      if (data._timeout)       errMsg = '❌ 타임아웃 (40초) — GAS 배포 권한 확인';
      if (data._networkError)  errMsg = '❌ 네트워크 오류 — 인터넷 연결 확인';
      if (data._error)         errMsg = `❌ ${data._error}`;
      html += `<div class="row"><span class="label">${tab.name}</span><span class="err">${errMsg}</span></div>`;
      continue;
    }
    if (data[0] && data[0]._error) {
      allOk = false;
      html += `<div class="row"><span class="label">${tab.name}</span><span class="err">❌ GAS 오류: ${data[0]._error}</span></div>`;
      continue;
    }

    totalRaw += data.length;
    const range = getDateRange(data);
    html += `<div class="row">
      <div><span class="label">${tab.name}</span><br><span class="range">${range}</span></div>
      <div style="text-align:right"><span class="count ok">${data.length}행</span></div>
    </div>`;
  }

  html += `<div class="row" style="margin-top:8px;padding-top:12px;border-top:2px solid #e2e8f0">
    <span class="label" style="font-size:14px">전체 합계</span>
    <span class="count" style="font-size:28px">${totalRaw}행</span>
  </div></div>`;

  if (!allOk) {
    html += `<div class="card" style="border:1.5px solid #fca5a5;background:#fff7f7">
      <p style="margin:0;font-size:13px;color:#b91c1c">
        <strong>⚠️ 일부 시트 오류</strong><br>
        GAS 배포 설정 확인:<br>
        → 배포 유형: <code>웹 앱</code><br>
        → 실행 권한: <code>나</code><br>
        → 액세스 권한: <code>모든 사용자(익명 포함)</code>
      </p>
    </div>`;
  }

  results.innerHTML = html;
  status.textContent = allOk ? `✅ 검증 완료 — 총 ${totalRaw}행 수신` : '⚠️ 일부 오류 발생';
  btn.disabled = false;
}
</script>
</body>
</html>
